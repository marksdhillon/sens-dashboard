name: Update Sens Dashboard

on:
  schedule:
    # Run daily at 6 AM UTC (1 AM ET) — catches all game results
    - cron: '0 6 * * *'
    # Also run at 10 AM UTC (5 AM ET) for late west coast games
    - cron: '0 10 * * *'
  # Manual trigger
  workflow_dispatch:
  # Rebuild on push to main
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build dashboard
        run: python build.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html previous.json
          git diff --staged --quiet || git commit -m "Update dashboard $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Pull latest changes from build job
        run: git pull origin main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
